<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khao Chomthong Hill Repeat #3 - Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #e67e22;
            --accent: #27ae60;
            --bg: #f4f7f6;
            --white: #ffffff;
            --border: #dcdde1;
            --info: #3498db;
            --event-green: #2d5a27;
        }

        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background: var(--bg); color: var(--primary); margin: 0; padding: 10px; line-height: 1.6; }
        .container { max-width: 850px; margin: 0 auto; background: var(--white); padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .header-section { text-align: center; margin-bottom: 20px; }
        .main-title { color: var(--event-green); font-size: 1.8rem; font-weight: 600; margin: 0; }
        
        h2, h3 { text-align: center; color: var(--primary); }
        h3 { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 30px; text-align: left; font-size: 1.2rem; color: var(--secondary); }
        
        .main-menu { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .menu-btn { padding: 10px 20px; border: 2px solid var(--primary); border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        input[name="main_menu"] { display: none; }
        input[name="main_menu"]:checked + .menu-btn { background: var(--primary); color: white; }

        .package-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .package-card { border: 2px solid #eee; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; }
        input[name="registration_package"] { display: none; }
        input[name="registration_package"]:checked + .package-card { border-color: var(--secondary); background: #fffaf5; }

        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .shirt-size-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 5px; }
        .shirt-size-item input { display: none; }
        .shirt-size-item label { display: block; padding: 8px; border: 1px solid var(--border); border-radius: 6px; text-align: center; cursor: pointer; font-size: 0.8rem; }
        .shirt-size-item input:checked + label { background: var(--secondary); color: white; border-color: var(--secondary); }

        .team-tabs { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; }
        .team-tab-btn { padding: 10px; cursor: pointer; border-radius: 8px; background: #eee; border: none; flex: 1; min-width: 80px; }
        .team-tab-btn.active { background: var(--primary); color: white; }
        .team-member-form { display: none; padding: 15px; border: 1px solid #eee; border-radius: 8px; background: #fafafa; }
        .team-member-form.active { display: block; }

        .summary-box { background: #f9f9f9; padding: 20px; border-radius: 12px; border-left: 5px solid var(--accent); margin-top: 20px; }
        .total-price { color: var(--accent); font-size: 1.4rem; font-weight: 600; }
        
        .btn-submit { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 20px; }
        .btn-submit:disabled { background: #ccc; }

        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .popup-content { background: white; padding: 30px; border-radius: 20px; max-width: 90%; text-align: center; }
        
        .hidden { display: none; }
        .required { color: red; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1 class="main-title">Khao Chomthong Hill Repeat #3</h1>
    </div>

    <div class="main-menu">
        <label><input type="radio" name="main_menu" value="registration" checked><div class="menu-btn">สมัครเข้าร่วม</div></label>
        <label><input type="radio" name="main_menu" value="status"><div class="menu-btn">ตรวจสอบสถานะ</div></label>
    </div>

    <div id="packageSection">
        <h2>เลือกประเภทการสมัคร</h2>
        <div class="package-grid">
            <label><input type="radio" name="registration_package" value="Solo" data-price="899"><div class="package-card"><h4>Solo</h4><div>899.-</div></div></label>
            <label><input type="radio" name="registration_package" value="VIP" data-price="1999"><div class="package-card"><h4>VIP</h4><div>1,999.-</div></div></label>
            <label><input type="radio" name="registration_package" value="Team" data-price="2499"><div class="package-card"><h4>Team</h4><div>2,499.-</div></div></label>
        </div>
    </div>

    <form id="registrationForm" class="hidden">
        <div id="teamNameCommon" class="form-group hidden">
            <label>ชื่อทีม <span class="required">*</span></label>
            <input type="text" name="team_name">
        </div>
        <div id="vipOnlyFields" class="form-group hidden">
            <label>หมายเลขทะเบียนรถ (เฉพาะ VIP) <span class="required">*</span></label>
            <input type="text" name="vehicle_registration">
        </div>

        <div id="singleEntryForm" class="hidden">
            <h3>ข้อมูลผู้สมัคร</h3>
            <div class="grid-2">
                <div class="form-group"><label>ชื่อ <span class="required">*</span></label><input type="text" name="p1_first_name" class="req-s"></div>
                <div class="form-group"><label>นามสกุล <span class="required">*</span></label><input type="text" name="p1_last_name" class="req-s"></div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>เลขบัตรประชาชน <span class="required">*</span></label><input type="tel" name="p1_id" maxlength="13" class="req-s"></div>
                <div class="form-group"><label>เบอร์โทรศัพท์ <span class="required">*</span></label><input type="tel" name="p1_phone" maxlength="10" class="req-s"></div>
            </div>
            <div class="form-group"><label>อีเมล (สำหรับรับแจ้งเตือน) <span class="required">*</span></label><input type="email" name="p1_email" class="req-s"></div>
            <div class="grid-2">
                <div class="form-group"><label>วันเดือนปีเกิด <span class="required">*</span></label><input type="date" name="p1_dob" class="req-s"></div>
                <div class="form-group"><label>กรุ๊ปเลือด <span class="required">*</span></label>
                    <select name="p1_blood" class="req-s">
                        <option value="">เลือก</option><option value="A">A</option><option value="B">B</option><option value="O">O</option><option value="AB">AB</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label>ที่อยู่ปัจจุบัน <span class="required">*</span></label><textarea name="p1_address" rows="2" class="req-s"></textarea></div>
            <div class="form-group"><label>โรคประจำตัว/แพ้ยา (ถ้ามี)</label><input type="text" name="p1_health"></div>
            <div class="grid-2">
                <div class="form-group"><label>ชื่อผู้ติดต่อฉุกเฉิน <span class="required">*</span></label><input type="text" name="p1_em_name" class="req-s"></div>
                <div class="form-group"><label>เบอร์โทรฉุกเฉิน <span class="required">*</span></label><input type="tel" name="p1_em_phone" class="req-s"></div>
            </div>
            <label>ไซส์เสื้อ <span class="required">*</span></label>
            <div class="shirt-size-grid" id="soloShirtGrid"></div>
        </div>

        <div id="teamEntryForm" class="hidden">
            <h3>ข้อมูลสมาชิกในทีม</h3>
            <div class="team-tabs">
                <button type="button" class="team-tab-btn active" onclick="showMember(1)">คนที่ 1</button>
                <button type="button" class="team-tab-btn" onclick="showMember(2)">คนที่ 2</button>
                <button type="button" class="team-tab-btn" onclick="showMember(3)">คนที่ 3</button>
            </div>
            
            <div id="m1" class="team-member-form active">
                <div class="grid-2">
                    <div class="form-group"><label>ชื่อ</label><input type="text" name="t1_fname" class="req-t"></div>
                    <div class="form-group"><label>นามสกุล</label><input type="text" name="t1_lname" class="req-t"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>บัตรประชาชน</label><input type="tel" name="t1_id" class="req-t"></div>
                    <div class="form-group"><label>เบอร์โทร</label><input type="tel" name="t1_phone" class="req-t"></div>
                </div>
                <div class="form-group"><label>อีเมล (หัวหน้าทีม)</label><input type="email" name="t1_email" class="req-t"></div>
                <div class="grid-2">
                    <div class="form-group"><label>วันเกิด</label><input type="date" name="t1_dob" class="req-t"></div>
                    <div class="form-group"><label>เลือด</label><select name="t1_blood" class="req-t"><option value="A">A</option><option value="B">B</option><option value="O">O</option><option value="AB">AB</option></select></div>
                </div>
                <div class="form-group"><label>ที่อยู่</label><textarea name="t1_address" class="req-t"></textarea></div>
                <div class="grid-2">
                    <div class="form-group"><label>ติดต่อฉุกเฉิน</label><input type="text" name="t1_em_name" class="req-t"></div>
                    <div class="form-group"><label>เบอร์ฉุกเฉิน</label><input type="tel" name="t1_em_phone" class="req-t"></div>
                </div>
                <label>ไซส์เสื้อ <span class="required">*</span></label>
                <div class="shirt-size-grid" id="t1ShirtGrid"></div>
            </div>

            <div id="m2" class="team-member-form">
                <div class="grid-2">
                    <div class="form-group"><label>ชื่อ</label><input type="text" name="t2_fname" class="req-t"></div>
                    <div class="form-group"><label>นามสกุล</label><input type="text" name="t2_lname" class="req-t"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>บัตรประชาชน</label><input type="tel" name="t2_id" class="req-t"></div>
                    <div class="form-group"><label>เบอร์โทร</label><input type="tel" name="t2_phone" class="req-t"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>วันเกิด</label><input type="date" name="t2_dob" class="req-t"></div>
                    <div class="form-group"><label>เลือด</label><select name="t2_blood" class="req-t"><option value="A">A</option><option value="B">B</option><option value="O">O</option><option value="AB">AB</option></select></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>ติดต่อฉุกเฉิน</label><input type="text" name="t2_em_name" class="req-t"></div>
                    <div class="form-group"><label>เบอร์ฉุกเฉิน</label><input type="tel" name="t2_em_phone" class="req-t"></div>
                </div>
                <label>ไซส์เสื้อ <span class="required">*</span></label>
                <div class="shirt-size-grid" id="t2ShirtGrid"></div>
            </div>

            <div id="m3" class="team-member-form">
                <div class="grid-2">
                    <div class="form-group"><label>ชื่อ</label><input type="text" name="t3_fname" class="req-t"></div>
                    <div class="form-group"><label>นามสกุล</label><input type="text" name="t3_lname" class="req-t"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>บัตรประชาชน</label><input type="tel" name="t3_id" class="req-t"></div>
                    <div class="form-group"><label>เบอร์โทร</label><input type="tel" name="t3_phone" class="req-t"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>วันเกิด</label><input type="date" name="t3_dob" class="req-t"></div>
                    <div class="form-group"><label>เลือด</label><select name="t3_blood" class="req-t"><option value="A">A</option><option value="B">B</option><option value="O">O</option><option value="AB">AB</option></select></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>ติดต่อฉุกเฉิน</label><input type="text" name="t3_em_name" class="req-t"></div>
                    <div class="form-group"><label>เบอร์ฉุกเฉิน</label><input type="tel" name="t3_em_phone" class="req-t"></div>
                </div>
                <label>ไซส์เสื้อ <span class="required">*</span></label>
                <div class="shirt-size-grid" id="t3ShirtGrid"></div>
            </div>
        </div>

        <div id="paymentSection" class="hidden">
            <div class="summary-box">
                <div class="form-group"><label>เลือกวิธีชำระเงิน</label>
                    <select name="payment_method" onchange="updateCalc()">
                        <option value="full">ชำระเต็มจำนวน</option>
                        <option value="installment">มัดจำ 50% (ผ่อนงวดที่ 1)</option>
                    </select>
                </div>
                <div class="total-price" id="priceLabel">ยอดโอน: 0 บาท</div>
                <p style="font-size:0.8rem; color:#666;">โอนเข้า: กสิกรไทย 1961551699 (เกสร วรรณปัด)</p>
            </div>
            <div class="form-group">
                <label>แนบสลิป <span class="required">*</span> (ระบบจะย่อรูปให้อัตโนมัติ)</label>
                <input type="file" id="paymentSlip" accept="image/*" required>
            </div>
            <label><input type="checkbox" id="agree" required> ยอมรับเงื่อนไขการแข่งขัน</label>
            <button type="submit" class="btn-submit" id="submitBtn" disabled>ยืนยันการสมัครและส่งข้อมูล</button>
        </div>
    </form>
</div>

<div id="popup" class="popup-overlay">
    <div class="popup-content">
        <h2 id="st">กำลังดำเนินการ...</h2>
        <p id="sm">กรุณารอสักครู่ ระบบกำลังนำข้อมูลของคุณเข้าสู่ระบบ</p>
        <button class="btn-submit hidden" id="ok" onclick="location.reload()">เรียบร้อย (กลับหน้าหลัก)</button>
    </div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw_SvDUNbg4l79j5cx7SLEqhAVk0ZYWs7lX8pVt6VUSKecfFJQ1o6_83vWdQHfFG7hu/exec';
    
    const SIZES = ['XS','S','M','L','XL','2XL','3XL','4XL','5XL'];
    let basePrice = 0;

    function renderSizes(containerId, prefix) {
        document.getElementById(containerId).innerHTML = SIZES.map(s => `
            <div class="shirt-size-item">
                <input type="radio" id="${prefix}_${s}" name="${prefix}_shirt" value="${s}" class="${prefix === 'p1' ? 'req-s' : 'req-t'}">
                <label for="${prefix}_${s}">${s}</label>
            </div>
        `).join('');
    }

    ['soloShirtGrid','t1ShirtGrid','t2ShirtGrid','t3ShirtGrid'].forEach((id,i)=>renderSizes(id, i===0?'p1':'t'+i));

    document.querySelectorAll('input[name="registration_package"]').forEach(r => {
        r.onchange = e => {
            basePrice = parseInt(e.target.dataset.price);
            const pkg = e.target.value;
            document.getElementById('registrationForm').classList.remove('hidden');
            document.getElementById('paymentSection').classList.remove('hidden');
            document.getElementById('vipOnlyFields').classList.toggle('hidden', pkg !== 'VIP');
            document.getElementById('teamNameCommon').classList.toggle('hidden', pkg !== 'Team');
            document.getElementById('singleEntryForm').classList.toggle('hidden', pkg === 'Team');
            document.getElementById('teamEntryForm').classList.toggle('hidden', pkg !== 'Team');
            updateCalc();
            document.querySelectorAll('.req-s').forEach(el => el.required = pkg !== 'Team');
            document.querySelectorAll('.req-t').forEach(el => el.required = pkg === 'Team');
        };
    });

    function updateCalc() {
        const isHalf = document.querySelector('select[name="payment_method"]').value === 'installment';
        document.getElementById('priceLabel').innerText = `ยอดโอน: ${(isHalf ? basePrice/2 : basePrice).toLocaleString()} บาท`;
    }

    function showMember(n) {
        document.querySelectorAll('.team-tab-btn').forEach((b,i)=>b.classList.toggle('active', i===n-1));
        document.querySelectorAll('.team-member-form').forEach((f,i)=>f.classList.toggle('active', i===n-1));
    }

    document.getElementById('agree').onchange = function() { document.getElementById('submitBtn').disabled = !this.checked; };

    // บีบอัดภาพเพื่อป้องกัน Payload size limit ของ Google Script
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const MAX_WIDTH = 800; // ลดขนาดลงเหลือ 800px เพื่อความชัวร์
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5)); // คุณภาพ 50% เพียงพอสำหรับสลิป
                };
            };
        });
    }

    document.getElementById('registrationForm').onsubmit = async function(e) {
        e.preventDefault();
        const popup = document.getElementById('popup');
        const st = document.getElementById('st');
        const sm = document.getElementById('sm');
        
        popup.style.display = 'flex';
        st.innerText = "กำลังย่อขนาดรูปสลิป...";
        
        try {
            const formData = new FormData(this);
            const payload = Object.fromEntries(formData.entries());
            
            const file = document.getElementById('paymentSlip').files[0];
            if(file) {
                payload.slip_base64 = await compressImage(file);
            }

            st.innerText = "กำลังนำข้อมูลเข้าสู่ฐานข้อมูล...";
            sm.innerText = "กรุณาอย่าปิดหน้านี้จนกว่าจะขึ้นเครื่องหมายถูก";
            
            payload.package = document.querySelector('input[name="registration_package"]:checked').value;
            payload.total_price = basePrice;
            
            // ใช้ JSON.stringify เพื่อให้ Script รับแบบ JSON Object
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'text/plain' }, // ป้องกัน Pre-flight CORS
                body: JSON.stringify(payload)
            });

            // เนื่องด้วยโหมด no-cors จะไม่รู้สถานะ success จริงๆ แต่ถ้าไม่มี Error ใน JS จะถือว่าส่งออกไปแล้ว
            st.innerText = "✅ สมัครสำเร็จ!";
            sm.innerText = "ระบบได้รับข้อมูลของคุณแล้ว ทีมงานจะตรวจสอบสลิปภายใน 24 ชม. และส่งอีเมลยืนยันให้คุณครับ";
            document.getElementById('ok').classList.remove('hidden');
        } catch (err) {
            console.error(err);
            st.innerText = "❌ เกิดข้อผิดพลาด";
            sm.innerText = "ไม่สามารถส่งข้อมูลได้: " + err.message + "\nกรุณาแคปหน้าจอนี้แจ้งแอดมิน";
            document.getElementById('ok').classList.remove('hidden');
            document.getElementById('ok').innerText = "ลองใหม่อีกครั้ง";
        }
    };
</script>
</body>
</html>
